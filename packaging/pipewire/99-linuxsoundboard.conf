# managed-by: linux-soundboard
# Persistent virtual microphone for Linux Soundboard.
#
# Creates one persistent Audio/Source/Virtual node. The soundboard feeds it
# through explicit graph links from linuxsoundboard.virtual_mic_feeder.

context.objects = [
    {   factory = adapter
        args = {
            factory.name     = support.null-audio-sink
            node.name        = "linuxsoundboard.virtual_mic"
            node.description = "Linux Soundboard Mic"
            media.class      = "Audio/Source/Virtual"
            audio.position   = [ FL FR ]
            object.linger    = true
            priority.session = 0
        }
    }
]
