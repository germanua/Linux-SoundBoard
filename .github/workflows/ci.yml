name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK and audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libpulse-dev libpipewire-0.3-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --manifest-path src/Cargo.toml -- --check
      - name: Build check
        run: cargo check --manifest-path src/Cargo.toml
      - name: Unit tests
        run: cargo test --manifest-path src/Cargo.toml
      - name: Clippy
        run: cargo clippy --manifest-path src/Cargo.toml --all-targets --all-features -- -D warnings
