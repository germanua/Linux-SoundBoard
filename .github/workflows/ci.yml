name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GTK and audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libpulse-dev libpipewire-0.3-dev
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Format check
        run: cargo fmt --manifest-path src/Cargo.toml -- --check
      
      - name: Build check
        run: cargo check --manifest-path src/Cargo.toml
      
      - name: Unit tests
        run: cargo test --manifest-path src/Cargo.toml
      
      - name: Clippy
        run: cargo clippy --manifest-path src/Cargo.toml --all-targets --all-features -- -D warnings

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libpulse-dev \
            pulseaudio-utils imagemagick libfuse2
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build AppImage
        run: ./packaging/linux/package-appimage.sh
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dist/*.AppImage
          retention-days: 30

  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-24.04
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper libgtk-4-dev libadwaita-1-dev \
            libpulse-dev libx11-dev libxi-dev pkg-config imagemagick cargo rustc
      
      - name: Build DEB package
        run: ./packaging/debian/package-deb.sh
      
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb
          retention-days: 30

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    container: fedora:40
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          dnf install -y rpm-build cargo rust gtk4-devel libadwaita-devel \
            pulseaudio-libs-devel libX11-devel libXi-devel pkgconfig ImageMagick git
      
      - name: Build RPM package
        run: ./packaging/rpm/package-rpm.sh
      
      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm
          retention-days: 30

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: rust-checks
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder python3
      
      - name: Add Flathub repository
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      
      - name: Install GNOME SDK 47
        run: |
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47 \
            org.freedesktop.Sdk.Extension.rust-stable//23.08
      
      - name: Build Flatpak
        run: |
          cd packaging/flatpak
          ./package-flatpak.sh
      
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: dist/*.flatpak
          retention-days: 30
