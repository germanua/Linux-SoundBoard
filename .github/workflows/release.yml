name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cat > release_notes.md << 'EOF'
          ## Linux Soundboard $VERSION

          ### Platform Support

          - Native Wayland support with `swhkd` hotkeys
          - Full native X11 and XWayland support
          - Virtual microphone support through PipeWire/PulseAudio

          ### Installation

          Choose the package format for your distribution:

          - **Ubuntu/Debian**: Download `linux-soundboard_$VERSION-1_amd64.deb`
          - **Fedora/RHEL**: Download `linux-soundboard-$VERSION-1.fc*.x86_64.rpm`
          - **Any Distribution**: Download `linux-soundboard-$VERSION.flatpak` or `linux-soundboard-x86_64.AppImage`
          - **Other Distros**: Use the generic release bundle from `package-release.sh`
          - **Arch Linux**: Use AUR: `yay -S linux-soundboard-git`

          ### What's New

          See [CHANGELOG.md](https://github.com/germanua/Linux-SoundBoard/blob/main/docs/CHANGELOG.md) for full details.

          ### Quick Start

          1. Install using your preferred method above
          2. Launch the application
          3. Select `Linux_Soundboard_Mic` as input in Discord/OBS/Zoom

          ### Documentation

          - [Troubleshooting Guide](https://github.com/germanua/Linux-SoundBoard/blob/main/docs/TROUBLESHOOTING.md)
          - [Contributing Guide](https://github.com/germanua/Linux-SoundBoard/blob/main/docs/CONTRIBUTING.md)

          ### Checksums

          See `SHA256SUMS.txt` for file verification.
          EOF
          sed -i "s/\$VERSION/$VERSION/g" release_notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libpulse-dev \
            pulseaudio-utils imagemagick libfuse2 libx11-dev libxi-dev pkg-config \
            libasound2-dev
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build AppImage and generic release bundle
        run: ./packaging/linux/package-release.sh
      
      - name: Upload AppImage artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/linux-soundboard-x86_64.AppImage
            dist/linux-soundboard-${{ needs.create-release.outputs.version }}-x86_64.AppImage
            dist/linux-soundboard-${{ needs.create-release.outputs.version }}-linux-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-24.04
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper libgtk-4-dev libadwaita-1-dev \
            libpulse-dev libx11-dev libxi-dev pkg-config imagemagick cargo rustc \
            libasound2-dev
      
      - name: Build DEB package
        run: ./packaging/debian/package-deb.sh
      
      - name: Upload DEB artifact
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    container: fedora:40
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          dnf install -y rpm-build cargo rust gtk4-devel libadwaita-devel \
            pulseaudio-libs-devel libX11-devel libXi-devel pkgconfig ImageMagick \
            git alsa-lib-devel gcc gcc-c++ clang
      
      - name: Build RPM package
        run: ./packaging/rpm/package-rpm.sh
      
      - name: Upload RPM artifact
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder python3
      
      - name: Add Flathub repository
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      
      - name: Install GNOME SDK 47
        run: |
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47 \
            org.freedesktop.Sdk.Extension.rust-stable//23.08
      
      - name: Build Flatpak
        run: |
          cd packaging/flatpak
          ./package-flatpak.sh
      
      - name: Upload Flatpak artifact
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [create-release, build-appimage, build-deb, build-rpm, build-flatpak]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download release assets
        uses: robinraju/release-downloader@v1.8
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: "downloads"
      
      - name: Generate SHA256 checksums
        run: |
          cd downloads
          sha256sum * > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt
      
      - name: Upload checksums
        uses: softprops/action-gh-release@v1
        with:
          files: SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-latest-tag:
    name: Update Latest Tag
    runs-on: ubuntu-latest
    needs: [build-appimage, build-deb, build-rpm, build-flatpak]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
